<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Việt Sát — Game thẻ bài chiến thuật bối cảnh lịch sử & thần thoại Việt Nam. Chơi online cùng bạn bè!" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Việt Sát — Game Thẻ Bài Việt Nam</title>
  </head>
  <body>
    <div id="error-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); color: red; z-index: 999999; padding: 20px; font-family: monospace; white-space: pre-wrap; overflow: auto;"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var overlay = document.getElementById('error-overlay');
        overlay.style.display = 'block';
        overlay.innerHTML += 'Error: ' + msg + '\\nURL: ' + url + '\\nLine: ' + lineNo + ' Column: ' + columnNo + '\\n\\nStack Trace:\\n' + (error && error.stack ? error.stack : 'No stack trace');
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var overlay = document.getElementById('error-overlay');
        overlay.style.display = 'block';
        overlay.innerHTML += 'Unhandled Promise Rejection:\\n' + (event.reason && event.reason.stack ? event.reason.stack : event.reason);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
